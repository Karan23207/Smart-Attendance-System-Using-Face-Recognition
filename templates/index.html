<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Attendance System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .card {
            border-radius: 20px;
        }

        .btn-custom {
            font-size: 18px;
            padding: 12px;
            border-radius: 10px;
        }

        .title {
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            color: #bbb;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <main class="w-100" style="max-width: 400px;">
        <div class="card p-4 shadow-lg text-center">

            <!-- Title -->
            <h2 class="title mb-2">Face Attendance</h2>
            <p class="subtitle mb-4">Smart & Secure System</p>

            <!-- Mark Attendance Button -->
            <a href="/mark_attendance" class="btn btn-success btn-custom w-100 mb-3">
                <i class="bi bi-camera-video-fill"></i> Mark Attendance
            </a>

            <!-- Register Button -->
            <a href="/onlyregisterface" class="btn btn-primary btn-custom w-100">
                <i class="bi bi-person-plus-fill"></i> Register Face
            </a>

            <a href="/view_attendance" class="btn btn-info w-100 py-2 mt-3">
                View Attendance
            </a>

        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
